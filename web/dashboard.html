<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX — Autonomous Trading Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-card: #1a1f2e;
            --bg-card-hover: #222840;
            --border: #2a3348;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --green: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --yellow: #f59e0b;
            --cyan: #06b6d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .status.live { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
        .status.offline { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .model-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--purple); background: rgba(139,92,246,0.1); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(139,92,246,0.2); }
        .clock { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }

        /* Account Row */
        .account-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
        .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .positive { color: var(--green); }
        .negative { color: var(--red); }

        /* Symbols Grid */
        .symbols-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .symbol-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color 0.2s; }
        .symbol-card:hover { border-color: var(--blue); }
        .symbol-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .symbol-name { font-size: 15px; font-weight: 700; }
        .symbol-price { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-secondary); }
        .symbol-status { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
        .symbol-status.scanning { background: rgba(59,130,246,0.15); color: var(--blue); }
        .symbol-status.analyzing { background: rgba(245,158,11,0.15); color: var(--yellow); }
        .symbol-status.signal { background: rgba(16,185,129,0.15); color: var(--green); }

        .confluence-bar { display: flex; gap: 3px; margin-top: 8px; }
        .c-seg { flex: 1; height: 5px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
        .c-seg.on { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.3); }
        .c-seg.warn { background: var(--yellow); }
        .confluence-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; justify-content: space-between; }

        /* Two-column layout */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
        .card-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }

        /* Council Feed */
        .council-feed { max-height: 300px; overflow-y: auto; }
        .council-entry { padding: 10px; border-radius: 6px; background: rgba(10,14,23,0.6); margin-bottom: 6px; border-left: 3px solid var(--blue); font-size: 12px; }
        .council-entry.buy { border-left-color: var(--green); }
        .council-entry.sell { border-left-color: var(--red); }
        .council-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
        .council-msg { margin-top: 3px; color: var(--text-secondary); line-height: 1.4; }

        /* Logs */
        .log-container { max-height: 300px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7; padding: 10px; background: rgba(10,14,23,0.8); border-radius: 6px; }
        .log-container::-webkit-scrollbar { width: 5px; }
        .log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .log-line { display: flex; gap: 8px; }
        .log-time { color: var(--text-muted); flex-shrink: 0; }
        .log-msg { color: var(--green); }
        .log-info { color: var(--cyan); }
        .log-warn { color: var(--yellow); }
        .log-error { color: var(--red); }

        /* Trades table */
        .full-width { grid-column: 1 / -1; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        tbody td { padding: 10px 12px; border-bottom: 1px solid rgba(42,51,72,0.4); color: var(--text-secondary); }
        .dir-buy { color: var(--green); font-weight: 600; }
        .dir-sell { color: var(--red); font-weight: 600; }
        .empty { text-align: center; padding: 30px; color: var(--text-muted); }

        @media (max-width: 900px) {
            .account-row { grid-template-columns: repeat(2, 1fr); }
            .bottom-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">⚡ APEX</div>
            <div class="status live" id="connStatus"><span class="dot"></span><span id="statusText">CONNECTING</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <span class="model-tag">Gemini 2.0 Flash</span>
            <span class="clock" id="clock"></span>
        </div>
    </div>

    <div class="account-row">
        <div class="stat-card"><div class="stat-label">Balance</div><div class="stat-value" id="balance">—</div><div class="stat-sub">Demo Account</div></div>
        <div class="stat-card"><div class="stat-label">Equity</div><div class="stat-value" id="equity">—</div><div class="stat-sub" id="eqDiff">—</div></div>
        <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value positive" id="winRate">0%</div><div class="stat-sub" id="tradeCount">0 trades</div></div>
        <div class="stat-card"><div class="stat-label">Active Symbols</div><div class="stat-value" id="symbolCount">0</div><div class="stat-sub">Monitoring</div></div>
    </div>

    <!-- Per-Symbol Confluence Cards -->
    <div class="symbols-grid" id="symbolsGrid"></div>

    <!-- Trades Table -->
    <div class="card full-width" style="margin-bottom:12px;">
        <div class="card-label">Open Trades</div>
        <table><thead><tr><th>Symbol</th><th>Direction</th><th>Entry</th><th>SL</th><th>TP</th><th>Time</th></tr></thead>
        <tbody id="tradesBody"><tr><td colspan="6" class="empty">Waiting for signals...</td></tr></tbody></table>
    </div>

    <div class="bottom-grid">
        <div class="card">
            <div class="card-label">AI Council Activity</div>
            <div class="council-feed" id="councilFeed">
                <div class="council-entry"><div class="council-time">Awaiting first analysis...</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-label">System Logs</div>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const symbols = {};

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000); updateClock();

        function connectSSE() {
            const es = new EventSource('/events');

            es.onopen = () => {
                document.getElementById('statusText').textContent = 'LIVE';
                document.getElementById('connStatus').className = 'status live';
                addLog('SSE connected', 'info');
            };

            es.onerror = () => {
                document.getElementById('statusText').textContent = 'RECONNECTING';
                document.getElementById('connStatus').className = 'status offline';
            };

            es.addEventListener('market_data', e => {
                const d = JSON.parse(e.data);
                if (!d.symbol) return;
                if (!symbols[d.symbol]) symbols[d.symbol] = { confluence: 0, price: '—', status: 'scanning', lastUpdate: Date.now() };
                symbols[d.symbol].lastUpdate = Date.now();
                if (d.price) symbols[d.symbol].price = d.price;
                renderSymbols();
            });

            es.addEventListener('account', e => {
                const d = JSON.parse(e.data);
                if (d && d.balance) {
                    document.getElementById('balance').textContent = '$' + parseFloat(d.balance).toLocaleString('en-US', {minimumFractionDigits:2});
                    document.getElementById('equity').textContent = '$' + parseFloat(d.equity).toLocaleString('en-US', {minimumFractionDigits:2});
                    const diff = (d.equity - d.balance).toFixed(2);
                    const el = document.getElementById('eqDiff');
                    el.textContent = diff >= 0 ? `+$${diff}` : `-$${Math.abs(diff)}`;
                    el.className = diff >= 0 ? 'stat-sub positive' : 'stat-sub negative';
                }
            });

            es.addEventListener('confluence', e => {
                const d = JSON.parse(e.data);
                if (d.symbol && symbols[d.symbol]) {
                    symbols[d.symbol].confluence = d.score;
                    symbols[d.symbol].status = d.score >= 4 ? 'analyzing' : 'scanning';
                    renderSymbols();
                }
            });

            es.addEventListener('council', e => {
                const d = JSON.parse(e.data);
                if (d.symbol && symbols[d.symbol]) {
                    symbols[d.symbol].status = d.direction !== 'NEUTRAL' ? 'signal' : 'scanning';
                    renderSymbols();
                }
                addCouncilEntry(d);
            });

            es.addEventListener('log', e => {
                const d = JSON.parse(e.data);
                addLog(d.message, d.type || 'msg');
            });

            es.addEventListener('trade', e => {
                const d = JSON.parse(e.data);
                addTrade(d);
            });

            es.addEventListener('stats', e => {
                const d = JSON.parse(e.data);
                if (d.winRate !== undefined) document.getElementById('winRate').textContent = d.winRate + '%';
                if (d.tradeCount !== undefined) document.getElementById('tradeCount').textContent = d.tradeCount + ' trades';
            });
        }

        function renderSymbols() {
            const grid = document.getElementById('symbolsGrid');
            const keys = Object.keys(symbols);
            document.getElementById('symbolCount').textContent = keys.length;

            grid.innerHTML = keys.map(sym => {
                const s = symbols[sym];
                const segs = [0,1,2,3,4].map(i => {
                    if (i < s.confluence) return s.confluence >= 4 ? 'c-seg on' : 'c-seg warn';
                    return 'c-seg';
                }).map(cls => `<div class="${cls}"></div>`).join('');

                return `<div class="symbol-card">
                    <div class="symbol-header">
                        <span class="symbol-name">${sym}</span>
                        <span class="symbol-status ${s.status}">${s.status}</span>
                    </div>
                    <div class="symbol-price">${s.price}</div>
                    <div class="confluence-bar">${segs}</div>
                    <div class="confluence-label"><span>Confluence</span><span>${s.confluence}/5</span></div>
                </div>`;
            }).join('');
        }

        function addLog(msg, type = 'msg') {
            const c = document.getElementById('logContainer');
            const t = new Date().toLocaleTimeString('en-US', {hour12:false});
            const d = document.createElement('div');
            d.className = 'log-line';
            d.innerHTML = `<span class="log-time">${t}</span><span class="log-${type}">${msg}</span>`;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
            while (c.children.length > 150) c.removeChild(c.firstChild);
        }

        function addCouncilEntry(data) {
            const f = document.getElementById('councilFeed');
            const cls = data.direction === 'BUY' ? 'buy' : data.direction === 'SELL' ? 'sell' : '';
            const t = new Date().toLocaleTimeString('en-US', {hour12:false});
            const d = document.createElement('div');
            d.className = `council-entry ${cls}`;
            d.innerHTML = `<div class="council-time">${t} — ${data.symbol||''}</div><div class="council-msg">${data.direction||'NEUTRAL'} | Confidence: ${data.confidence||0}%<br>${data.rationale||''}</div>`;
            f.insertBefore(d, f.firstChild);
            while (f.children.length > 30) f.removeChild(f.lastChild);
        }

        function addTrade(t) {
            const tbody = document.getElementById('tradesBody');
            const empty = tbody.querySelector('.empty'); if (empty) empty.parentElement.remove();
            const row = document.createElement('tr');
            const cls = t.direction === 'BUY' ? 'dir-buy' : 'dir-sell';
            const arrow = t.direction === 'BUY' ? '▲' : '▼';
            const time = new Date().toLocaleTimeString('en-US', {hour12:false});
            row.innerHTML = `<td style="color:var(--text-primary);font-weight:500">${t.symbol}</td><td class="${cls}">${arrow} ${t.direction}</td><td>${t.entry}</td><td>${t.sl}</td><td>${t.tp}</td><td style="color:var(--text-muted)">${time}</td>`;
            tbody.insertBefore(row, tbody.firstChild);
        }

        connectSSE();
        addLog('APEX Dashboard initialized', 'info');
    </script>
</body>
</html>
